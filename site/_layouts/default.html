<!doctype html>
<html lang="en">
<head>

  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
  <header>
    <a href="/" class="site-title">Jeraenium</a>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>Jeraenium — greenhouse intelligence, careful observation, and humane AI.</p>
  </footer>
</body>
</html>
